# HTTP server block (port 80)
server {
    listen 80;
    server_name ${DOMAIN_NAME} ${WWW_DOMAIN_NAME};

    # Let's Encrypt challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block (port 443)
server {
    listen 443 ssl;
    server_name ${DOMAIN_NAME} ${WWW_DOMAIN_NAME};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 30M;  # Increase the maximum upload size

    # Favicon handling
    location = /favicon.ico {
        alias /app/static/HomeApp/img/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Media file handling
    location /media/ {
        alias /app/media/;
    }

    # Static file handling
    location /static/ {
        alias /app/static/;
    }

    # Main app traffic proxying
    location / {
        proxy_pass http://mainframe:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        # Timeout settings
        proxy_read_timeout 500;
        proxy_connect_timeout 500;
    }
}

# Redirect to main domain from IP address
server {
    listen 80;
    server_name ${SERVER_IP};

    # Let's Encrypt challenge location for IP access
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS domain
    location / {
        return 301 https://${DOMAIN_NAME}$request_uri;
    }
}

# HTTPS redirect from IP to HTTPS domain
server {
    listen 443 ssl;
    server_name ${SERVER_IP};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    return 301 https://${DOMAIN_NAME}$request_uri;
}
